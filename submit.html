<!DOCTYPE html>
<html lang="en">
    <link
    rel="icon"
    href=
"./RESTEASY (1).png"
    type="image/x-icon"
/>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Completed</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .message-container {
            text-align: center;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1.5s ease-out;
        }

        .checkmark-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .circle-background {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleUp 0.5s ease-out 0.3s forwards;
            transform: scale(0);
        }

        .checkmark-icon {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .message-container h1 {
            color: #4CAF50;
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: bounceIn 1.2s ease-out;
        }

        .message-container p {
            color: #555555;
            font-size: 1.2em;
            animation: typing 2s steps(30, end), blink 0.7s step-end infinite;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #555555;
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none; /* Remove underline */
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        .home-button:hover {
            background-color: #45a049; /* Darker shade on hover */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            to { transform: scale(1); }
        }

        @keyframes bounceIn {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="message-container">
        <div class="checkmark-container">
            <!-- Circle Background with SVG Checkmark Icon -->
            <div class="circle-background">
                <svg class="checkmark-icon" viewBox="0 0 24 24">
                    <path d="M9 19l-7-7 1.4-1.4L9 16.2 20.6 4.6 22 6z"/>
                </svg>
            </div>
        </div>
        <h1>Submission Successful!</h1>
        <p>Your form has been submitted successfully. Thank you!</p>
        <a href="index.html" class="home-button">
            <i class="fas fa-home"></i> Home
        </a>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script> <!-- Include Font Awesome for the home icon -->
</body>
</html>
